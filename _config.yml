title: Kirep Blog
subtitle: 记录代码、工具与想法
description: 一个专注于代码、工具和学习记录的个人博客。
url: "https://<username>.github.io"
baseurl: ""
lang: zh-CN
timezone: Asia/Shanghai

permalink: /:year/:month/:day/:title/
markdown: kramdown
highlighter: rouge
excerpt_separator: "<!--more-->"

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-sitemap

author:
  name: Kirep
  email: your-email@example.com
  github: fanho

navigation:
  - title: Home
    url: /
  - title: Archive
    url: /archive/
  - title: Categories
    url: /categories/
  - title: Tags
    url: /tags/
  - title: About
    url: /about/
  - title: Search
    url: /search/

defaults:
  - scope:
      path: ""
    values:
      layout: page
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
