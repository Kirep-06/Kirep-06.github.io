<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

{% assign page_title = page.title | default: site.title %}
{% if page.title %}
  <title>{{ page_title }} | {{ site.title }}</title>
{% else %}
  <title>{{ site.title }} - {{ site.subtitle }}</title>
{% endif %}

{% assign page_description = page.description | default: page.excerpt | default: site.description %}
<meta name="description" content="{{ page_description | strip_html | normalize_whitespace | truncate: 160 }}">
<meta name="author" content="{{ site.author.name }}">

<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:title" content="{{ page_title }}">
<meta property="og:description" content="{{ page_description | strip_html | normalize_whitespace | truncate: 160 }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">

<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{{ page_title }}">
<meta name="twitter:description" content="{{ page_description | strip_html | normalize_whitespace | truncate: 160 }}">

<link rel="canonical" href="{{ page.url | absolute_url }}">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }} Feed" href="{{ '/feed.xml' | relative_url }}">

<script>
  (function() {
    var saved = localStorage.getItem('theme');
    var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var theme = saved || (systemDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
