<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="brand-title">{{ site.title }}</span>
      <span class="brand-subtitle">{{ site.subtitle }}</span>
    </a>

    <nav class="site-nav" aria-label="主导航">
      {% for item in site.navigation %}
        <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>

    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换明暗模式">Dark</button>
  </div>
</header>
