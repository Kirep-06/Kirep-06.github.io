<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    {% include head.html %}
  </head>
  <body data-baseurl="{{ site.baseurl | escape }}">
    {% include header.html %}

    <main class="site-main">
      <div class="container">
        {{ content }}
      </div>
    </main>

    {% include footer.html %}
    {% include analytics.html %}

    <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
    {% if page.scripts %}
      {% for script in page.scripts %}
        <script src="{{ script | relative_url }}" defer></script>
      {% endfor %}
    {% endif %}
  </body>
</html>
