    <article class="post-body">
      <h2>背景</h2>
      <p>这篇文章记录我如何把 Harness 引入 autoresearch 流程，用来减少重复检索步骤并稳定产出格式。</p>

      <h2>核心做法</h2>
      <p>我的策略是先定义最小输入，再把检索、筛选、汇总拆成固定阶段，每一阶段只输出下一步需要的数据。</p>

      <pre><code>// pseudo
input -&gt; search -&gt; filter -&gt; summarize -&gt; final note</code></pre>

      <h2>结果</h2>
      <p>在相同时间窗口内，我能更快得到可复用结论，也更容易追踪每一步的错误来源。</p>
