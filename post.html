<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post - Kirep Notes</title>
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .post-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .post-actions input {
      border: 1px solid var(--line);
      border-radius: 0;
      background: transparent;
      color: var(--text);
      padding: 6px 8px;
      font: inherit;
      font-size: 0.9rem;
      min-width: 220px;
    }

    .post-actions button {
      border: 1px solid #4f5b6b;
      border-radius: 0;
      background: transparent;
      color: var(--text);
      padding: 6px 10px;
      font: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .post-actions button.danger {
      border-color: #7a3a42;
      background: transparent;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap head-row">
      <h1 class="title">Blog</h1>
      <nav>
        <a class="active" href="./index.html">Blog</a>
        <a href="./about.html">About</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <a class="back-link" href="./index.html">← 返回文章列表</a>
    <article id="md" class="md-body"></article>
    <div class="post-actions">
      <input id="token" placeholder="输入后端 Token 后可删除文章" />
      <button id="deleteBtn" class="danger" type="button">删除文章</button>
      <span id="status" class="post-meta"></span>
    </div>
  </main>

  <script>
    const container = document.getElementById("md");
    const tokenEl = document.getElementById("token");
    const deleteBtn = document.getElementById("deleteBtn");
    const statusEl = document.getElementById("status");
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file");

    function esc(s) {
      return s.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function inline(md) {
      return esc(md)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    }

    function renderMarkdown(md) {
      const lines = md.replace(/\r\n/g, "\n").split("\n");
      let html = "";
      let inCode = false;
      let inList = false;
      let paragraph = [];

      function flushParagraph() {
        if (paragraph.length > 0) {
          html += "<p>" + inline(paragraph.join(" ")) + "</p>";
          paragraph = [];
        }
      }

      function closeList() {
        if (inList) {
          html += "</ul>";
          inList = false;
        }
      }

      for (const lineRaw of lines) {
        const line = lineRaw.trimEnd();

        if (line.startsWith("```")) {
          flushParagraph();
          closeList();
          if (!inCode) {
            inCode = true;
            html += "<pre><code>";
          } else {
            inCode = false;
            html += "</code></pre>";
          }
          continue;
        }

        if (inCode) {
          html += esc(lineRaw) + "\n";
          continue;
        }

        if (line === "") {
          flushParagraph();
          closeList();
          continue;
        }

        if (line.startsWith("### ")) {
          flushParagraph();
          closeList();
          html += "<h3>" + inline(line.slice(4)) + "</h3>";
          continue;
        }
        if (line.startsWith("## ")) {
          flushParagraph();
          closeList();
          html += "<h2>" + inline(line.slice(3)) + "</h2>";
          continue;
        }
        if (line.startsWith("# ")) {
          flushParagraph();
          closeList();
          html += "<h1>" + inline(line.slice(2)) + "</h1>";
          continue;
        }

        if (line.startsWith("- ")) {
          flushParagraph();
          if (!inList) {
            html += "<ul>";
            inList = true;
          }
          html += "<li>" + inline(line.slice(2)) + "</li>";
          continue;
        }

        paragraph.push(line);
      }

      flushParagraph();
      closeList();
      if (inCode) html += "</code></pre>";

      return html || "<p>内容为空。</p>";
    }

    async function deleteCurrentPost() {
      if (!file) {
        statusEl.textContent = "缺少文件参数。";
        return;
      }
      const token = tokenEl.value.trim() || localStorage.getItem("blog_admin_token") || "";
      if (!token) {
        statusEl.textContent = "请先输入 Token。";
        return;
      }
      localStorage.setItem("blog_admin_token", token);
      statusEl.textContent = "正在删除...";
      try {
        const res = await fetch("http://localhost:8080/api/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json", "X-Admin-Token": token },
          body: JSON.stringify({ file, token })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          statusEl.textContent = "删除失败: " + (data.message || "unknown error");
          return;
        }
        statusEl.textContent = "删除成功，2秒后返回列表...";
        setTimeout(() => { window.location.href = "./index.html"; }, 2000);
      } catch (err) {
        statusEl.textContent = "请求失败: 请先启动 Go 后端。";
      }
    }

    const savedToken = localStorage.getItem("blog_admin_token");
    if (savedToken) tokenEl.value = savedToken;

    deleteBtn.addEventListener("click", deleteCurrentPost);

    if (!file) {
      container.innerHTML = "<p>缺少文章文件参数。</p>";
    } else {
      fetch(file)
        .then((r) => (r.ok ? r.text() : Promise.reject(new Error("not found"))))
        .then((text) => {
          container.innerHTML = renderMarkdown(text);
        })
        .catch(() => {
          container.innerHTML = "<p>文章加载失败，请检查链接是否正确。</p>";
        });
    }
  </script>
</body>
</html>
